<app-layout class="lg:max-h-screen">
  <div
    *ngIf="loading || !drawingNotFound"
    class="mr-details-container"
    [ngClass]="{ favorite: drawing.favorite }">
    <div class="flex w-full flex-col gap-2 sm:col-span-2">
      <app-loading [loading]="loading">
        <h1 class="mr-image-page-title" content *ngIf="drawing.title !== ''">
          <span>
            <app-translatable [originalText]="drawing.title">
            </app-translatable>
          </span>
        </h1>
        <div loading class="h-8 w-full"></div>
      </app-loading>
    </div>

    <div class="mr-main-details-container">
      <!-- <div class="mr-detail-grid-cell min-h-96 w-96 bg-yellow-700"></div>
      <div class="mr-detail-grid-cell min-h-96  bg-red-600"></div> -->

      <app-art-details-image
        class="mr-detail-grid-cell"
        [loading]="loading"
        [drawing]="drawing"
        (submittedCheer)="receiveCheer($event)">
      </app-art-details-image>
      <div class="mr-detail-grid-cell-details" *ngIf="drawing">
        <app-drawing-info
          [drawing]="drawing"
          [loading]="loading"
          (voteSubmitted)="receiveVoteSubmitted($event)">
        </app-drawing-info>
      </div>
    </div>
  </div>

  <div
    *ngIf="!loading && drawingNotFound"
    class="flex flex-col flex-nowrap gap-3">
    <h1>
      {{ text('NOTFOUND.TITLE') | mrTranslate }}
    </h1>
    <h3>
      {{ text('NOTFOUND.SUBTITLE') | mrTranslate: { id } }}
    </h3>
    <a routerLink="/art">
      {{ text('NOTFOUND.GO-TO-GALLERY') | mrTranslate }}
    </a>
  </div>
</app-layout>
